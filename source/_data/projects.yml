profile:
  headline: "Embedded Linux, BSP, AIoT, Android Porting"
  intro: "Nopiskl 的个人项目主页，聚焦 Embedded Linux、Mainline Kernel / U-Boot、BSP、SoC、驱动子系统、音视频链路、Android 系统移植与边缘 AI 应用工程。这里保留项目入口与文档导航，完整项目说明以 GitHub 个人介绍仓库为准。"
  docs_intro: "文档区用于沉淀 Linux、驱动、BSP、SoC、Android HAL、AIoT 音视频链路等工程笔记，适合阅读长文、源码分析和阶段性问题复盘。"
  index_url: "https://github.com/Nopiskl/Nopiskl"
  blog_url: "https://blog.csdn.net/Nopiskl"

focus:
  - "Embedded Linux / Bootloader / Kernel / Driver"
  - "RISC-V MCU / SoC / FPGA deployment"
  - "BSP / Rootfs / ARM64 Linux porting"
  - "Edge AI / AIoT / Audio-video pipelines"
  - "Android system porting / HAL adaptation"
  - "AI application engineering / Web dashboards"

featured:
  - name: "FPGA"
    summary: "从可综合 MCU 到可运行 Linux 的 RISC-V64 SoC，关注底层架构、外设链路和 FPGA 验证。"
    projects:
      - name: "RISC-V_MCU"
        url: "https://github.com/Nopiskl/RISC-V_MCU"
        status: "FPGA / MCU"
        cover: "/images/projects/risc-v-mcu.png"
        description: "自研三级流水 RISC-V MCU，支持中断与基础外设，并完成 RTOS 移植和 FPGA 部署。"
        details:
          - "三级流水线 CPU 设计"
          - "中断、外设与 RTOS 验证"
          - "FPGA 实机部署"
      - name: "RISCV64_SOC"
        url: "https://github.com/Nopiskl/RISCV64_SOC"
        status: "RISC-V64 / Linux"
        cover: "/images/projects/riscv64-soc.png"
        description: "可运行 Linux 的 RISC-V64 SoC 适配项目，面向 pinctrl、I2C、SPI、SDCard、网口等基础外设与 Debian rootfs 运行。"
        details:
          - "Linux-capable RISC-V64 SoC"
          - "基础外设与启动链路适配"
          - "Debian rootfs on FPGA"

  - name: "Embedded A/V"
    summary: "嵌入式音视频、摄像头链路、硬件媒体框架和边缘 AI 产品原型。"
    projects:
      - name: "AI_SportCamera"
        url: "https://github.com/Nopiskl/AI_SportCamera"
        status: "V851S / YOLO"
        cover: "/images/projects/ai-sportcamera.png"
        description: "V851S YOLO 相机 / 行车记录仪，包含 OpenCV 通用版、全志 MPP 版本和原型 PCB 设计。"
        details:
          - "摄像头采集与 AI 推理"
          - "OpenCV 与全志 MPP 双路线"
          - "运动相机 / 记录仪原型"
      - name: "V821_AIGlassess"
        url: "https://github.com/Nopiskl/V821_AIGlassess"
        status: "V821 / AI Glasses"
        cover: "/images/projects/v821-ai-glasses.png"
        description: "基于 V821 的光波导 AI 眼镜项目，支持本地小智 AI、触摸拍照、录音录像和原型 PCB 设计。"
        details:
          - "光波导 AI 眼镜原型"
          - "本地语音助手与多媒体采集"
          - "触摸交互与 PCB 设计"

  - name: "Android"
    summary: "Android 系统移植、Linux 驱动适配、HAL 层开发与上层应用联动。"
    projects:
      - name: "A133-Android-Phone"
        url: "https://github.com/Nopiskl/A133-Android-Phone"
        status: "Android 10"
        cover: "/images/projects/a133-android-phone.png"
        description: "A133 Android10 MobilePhone，包含硬件设计、Android 10 系统移植、HIDL / Legacy HAL 驱动适配和演示 APP。"
        details:
          - "Android 10 系统移植"
          - "HIDL / Legacy HAL 适配"
          - "硬件设计与演示应用"
      - name: "A733_AndroidPad"
        url: "https://github.com/Nopiskl/A733_AndroidPad"
        status: "Android 15"
        cover: "/images/projects/a733-android-pad.png"
        description: "A733 Android15 Pad，基于 Teclast P50AI 原型，覆盖 Android15 系统移植、HIDL/AIDL 驱动适配和 NPU 视觉 APP 开发。"
        details:
          - "Android 15 平板移植"
          - "HIDL / AIDL 驱动适配"
          - "NPU 视觉应用开发"

  - name: "BSP"
    summary: "MicroPC 硬件平台与轻量化 Linux BSP SDK 配套推进，覆盖启动链路、Rootfs 与多系统适配。"
    projects:
      - name: "T527_MicroPC"
        url: "https://github.com/Nopiskl/T527_MicroPC"
        status: "Hardware / IIoT"
        cover: "/images/projects/t527-micropc.png"
        description: "基于 T527 的 MicroPC / IIoT 平台，包含 8 层高速 PCB、官方 SDK 适配、自定义 BSP，以及 Mainline Linux、Ubuntu CLI、Armbian、OpenWrt 适配。"
        details:
          - "T527 MicroPC 硬件平台"
          - "8 层高速 PCB 与 BSP 适配"
          - "多 Linux 发行环境验证"
      - name: "Linux_BSP"
        url: "https://github.com/Nopiskl/Linux_BSP"
        status: "SDK / BSP"
        cover: "/images/projects/linux-bsp.png"
        description: "轻量化 Linux 开发 SDK，面向 Mainline U-Boot、Kernel 和 Rootfs，支持自动化 BSP 编译、自定义配置和多 SoC 复用。"
        details:
          - "Mainline U-Boot / Kernel / Rootfs"
          - "自动化 BSP 构建"
          - "面向多 SoC 复用"

