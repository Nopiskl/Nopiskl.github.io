profile:
  headline: "Embedded Linux, BSP, AIoT, Android Porting"
  intro: "Nopiskl 的项目主页，整理嵌入式 Linux、SoC、驱动、BSP、边缘 AI、Android 系统移植和 AI 应用工程方向。项目的详细说明、更新状态与仓库入口以 GitHub 个人项目索引为准。"
  index_url: "https://github.com/Nopiskl/Nopiskl"
  blog_url: "https://blog.csdn.net/Nopiskl"

focus:
  - "Embedded Linux / Bootloader / Kernel / Driver"
  - "RISC-V MCU / SoC / FPGA deployment"
  - "BSP / Rootfs / ARM64 Linux porting"
  - "Edge AI / AIoT / Audio-video pipelines"
  - "Android system porting / HAL adaptation"
  - "AI application engineering / Web dashboards"

categories:
  - name: "学习笔记"
    summary: "Linux 内核、Bootloader、驱动子系统、Android HAL、AI 基础、CNN、Transformer 与 LLM 相关学习材料。"
    projects:
      - name: "Learning_Notes"
        url: "https://github.com/Nopiskl/Learning_Notes"
        status: "Notes"
        description: "底层系统与 AI 学习资料汇总，覆盖 Mainline Linux、U-Boot、V4L2、DRM、Pinctrl、Android HAL、CNN、YOLO 和 Transformer。"

  - name: "底层系统 / CPU / SoC / FPGA"
    summary: "RISC-V MCU、RISC-V64 SoC、FPGA 部署、Bootloader 与 Linux 启动流程方向。"
    projects:
      - name: "RISC-V_MCU"
        url: "https://github.com/Nopiskl/RISC-V_MCU"
        status: "FPGA"
        description: "自研三级流水 RISC-V MCU，支持中断与外设，并完成 RTOS 移植和 FPGA 部署。"
      - name: "RISCV64_SOC"
        url: "https://github.com/Nopiskl/RISCV64_SOC"
        status: "Linux"
        description: "可运行 Linux 的 RISC-V64 SoC 适配项目，支持 pinctrl、I2C、SPI、SDCard、网口等基础外设，并可在 XC7A100T FPGA 上运行 Debian 11 rootfs。"

  - name: "IIoT / BSP / Rootfs"
    summary: "PCB 设计、ARM64 Linux 移植、Ubuntu/Armbian/OpenWrt 适配、BSP 与工业嵌入式平台。"
    projects:
      - name: "Linux_BSP"
        url: "https://github.com/Nopiskl/Linux_BSP"
        status: "SDK"
        description: "轻量化 Linux 开发 SDK，面向 Mainline U-Boot、Kernel 和 Rootfs，支持自动化 BSP 编译、自定义配置和多 SoC 复用。"
      - name: "T527_MicroPC"
        url: "https://github.com/Nopiskl/T527_MicroPC"
        status: "Hardware"
        description: "基于 T527 的 MicroPC / IIoT 平台，包含 8 层高速 PCB、官方 SDK 适配、自定义 BSP，以及 Mainline Linux、Ubuntu CLI、Armbian、OpenWrt 适配。"

  - name: "嵌入式音视频 / Edge AI / AIoT"
    summary: "嵌入式 Linux 音视频链路、硬件编解码、NPU 加速、C++ 网络通信和 AIoT 全栈项目。"
    projects:
      - name: "AI_SportCamera"
        url: "https://github.com/Nopiskl/AI_SportCamera"
        status: "V851S"
        description: "V851S YOLO 相机 / 行车记录仪，包含 OpenCV 通用版、全志 MPP 版本和原型 PCB 设计。"
      - name: "AI_SecurityRecorder"
        url: "https://github.com/Nopiskl/AI_SecurityRecorder"
        status: "V853"
        description: "V853 AIoT 安防记录仪，支持 RTSP 推流、标记录像、智能抓拍和人形检测警报。"
      - name: "V821_AIGlassess"
        url: "https://github.com/Nopiskl/V821_AIGlassess"
        status: "V821"
        description: "基于 V821 的光波导 AI 眼镜项目，支持本地小智 AI、触摸拍照、录音录像和原型 PCB 设计。"
      - name: "Smart_IPC"
        url: "https://github.com/Nopiskl/Smart_IPC"
        status: "RV1106"
        description: "RV1106 YOLO IPC，支持手机小程序与 Web 控制、AI 识别、RTSP 推流，并使用 Rockchip VPU / NPU 加速。"
      - name: "HiSilicon_IPC"
        url: "https://github.com/Nopiskl/HiSilicon_IPC"
        status: "MPP"
        description: "HiSilicon 平台 IPC 摄像头 MPP 应用开发项目，偏应用层实现。"
      - name: "AIOT"
        url: "https://github.com/Nopiskl/AIOT"
        status: "Agent"
        description: "面向 Allwinner T527/A733 与 Rockchip RK3568/RK3576/RK3588 等平台的 AI agent 环境。"

  - name: "Android 系统移植 / HAL"
    summary: "Android 系统移植、Linux 驱动适配、HAL 层开发和上层应用联动。"
    projects:
      - name: "A133-Android-Phone"
        url: "https://github.com/Nopiskl/A133-Android-Phone"
        status: "Android 10"
        description: "A133 Android10 MobilePhone，包含硬件设计、Android 10 系统移植、HIDL / Legacy HAL 驱动适配和演示 APP。"
      - name: "A733_AndroidPad"
        url: "https://github.com/Nopiskl/A733_AndroidPad"
        status: "Android 15"
        description: "A733 Android15 Pad，基于 Teclast P50AI 原型，覆盖 Android15 系统移植、HIDL/AIDL 驱动适配和 NPU 视觉 APP 开发。"

  - name: "AI 应用工程"
    summary: "AI 模型应用、桌面检测、后端服务、数据库存储和 Web 可视化。"
    projects:
      - name: "Qt_YOLOv5_DetectSystem"
        url: "https://github.com/Nopiskl/Qt_YOLOv5_DetectSystem"
        status: "Full Stack"
        description: "桌面端实时检测 + 本地数据库 + 后端查询 + Web 仪表板工程，Qt6/C++ 调用摄像头与 YOLOv5 ONNX，FastAPI 和 Vue/Vite 展示结果。"

  - name: "Linux 网络 / 工业网关"
    summary: "Linux 网络服务、工业网关、数据采集、代理服务与 Web 管理界面。"
    projects:
      - name: "Embedded_TinyGateway"
        url: "https://github.com/Nopiskl/Embedded_TinyGateway"
        status: "Gateway"
        description: "轻量级工业网关系统方案，提供数据采集、文件服务、代理服务和 Web 管理界面，强调基础 Linux 系统调用和低资源占用。"

  - name: "Misc Projects"
    summary: "独立项目、早期应用实践和个人 Blog 关联资源。"
    projects:
      - name: "PVZ_CPP_Remake"
        url: "https://github.com/Nopiskl/PVZ_CPP_Remake"
        status: "C++"
        description: "PVZ C++ 自制版，用于学习 C++、设计模式和底层游戏引擎。"
      - name: "Allwinner_Drivers"
        url: "https://github.com/Nopiskl/Allwinner_Drivers"
        status: "Drivers"
        description: "个人 Blog 中提到的一些 Allwinner 相关驱动与资源。"
